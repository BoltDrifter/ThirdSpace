name: thirdspace
description: "ThirdSpace — Real-time Social Gravity Map"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  provider: ^6.1.1
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.1.0
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  firebase_core: ^2.24.2
  cloud_firestore: ^4.14.0
  firebase_auth: ^4.16.0
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter_native_splash:
  android: true
  ios: true

  color: "#26272a"
  image: assets/new_logo.png
  
  android_12:
    color: "#26272a"
    image: assets/new_logo.png

flutter:
  uses-material-design: true
  assets:
    - assets/
